---
- name: Ensure apt cache updated
  apt: update_cache=yes cache_valid_time=600
  when: ansible_os_family == "Debian"

- name: Ensure required package installed
  package:
    name:
      - git
      - curl
    state: present

- name: Ensure chezmoi installed and initialized
  block:
    - name: Check chezmoi install stat
      ansible.builtin.stat:
        path: "{{ chezmoi_bin }}"
      register: _chezmoi_bin

    - name: Download chezmoi install scripts
      ansible.builtin.get_url:
        url: https://chezmoi.io/get
        dest: /tmp/chezmoi-install.sh
        mode: "775"
      when: not _chezmoi_bin.stat.exists

    - name: Execute chezmoi scripts
      ansible.builtin.command:
        cmd: /tmp/chezmoi-install.sh -d
        creates: "{{ chezmoi_bin }}"
        chdir: "{{ chezmoi_user_home }}"
      register: stat
      retries: 5
      delay: 3
      until: stat.rc == 0
      when: not _chezmoi_bin.stat.exists

    - name: Check existing chezmoi dotfiles
      ansible.builtin.stat:
        path: "{{ chezmoi_target }}"
      register: _chezmoi_target

    - name: Initializing existing chezmoi repo
      ansible.builtin.command:
        cmd: "{{ chezmoi_bin }} init --apply {{ chezmoi_repo }}"
        chdir: "{{ chezmoi_user_home }}"
      when: false == _chezmoi_target.stat.exists
      changed_when: false

  become: true
  become_user: "{{ chezmoi_user }}"
